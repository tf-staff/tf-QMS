/* ============================================================
   VIEW: Manage QMS Access (board-scoped whitelist, self-governing)
============================================================ */
QMS.viewAccess = function(t, app){
  document.body.classList.add('mode-modal');
  var render = function(){
    Promise.all([QMS.getWl(t), QMS.me(t), t.board('members')]).then(function(r){
      var wl=r[0], me=r[1], members=(r[2]&&r[2].members)||[];
      var meIn = wl.some(function(e){ return e.id===me.id; });
      app.innerHTML='';
      app.appendChild(QMS.el('<div class="ovhead"><span class="ovt">Manage QMS Access</span>' +
        '<span class="ovn">' + wl.length + ' authorized</span></div>'));

      if(wl.length===0){
        /* Seeding: with an empty whitelist there is no one to approve anyone,
           so the first board member to claim admin becomes the seed entry.
           (Documented in README; do this immediately after enabling the
           Power-Up on each board.) */
        var seed = QMS.el('<div class="notice warn"><b>No QMS members yet on this board.</b> ' +
          'The whitelist is self-governing once seeded — claim the first entry now, then add the rest of the team below. ' +
          'Do this right after installing, before the board is in active QMS use.</div>');
        var sb = QMS.el('<button class="qbtn save">Add myself (' + QMS.esc(me.fullName||me.username) + ') as first QMS member</button>');
        sb.onclick = function(){
          QMS.setWl(t, [{id:me.id, n:me.fullName||me.username}]).then(render);
        };
        app.appendChild(seed); app.appendChild(sb);
        QMS.fit(t); return;
      }

      if(!meIn){
        app.appendChild(QMS.el('<div class="notice">You are not on this board\u2019s QMS whitelist, so this list is read-only for you. ' +
          'Ask one of the members below to add you.</div>'));
      }

      app.appendChild(QMS.el('<div class="ghead"><span class="gname">Authorized members</span></div>'));
      wl.forEach(function(e){
        var row = QMS.el('<div class="mrow"><span class="mn">' + QMS.esc(e.n||e.id) + '</span></div>');
        if(meIn){
          var rm = QMS.el('<button class="qbtn danger sm">Remove</button>');
          if(e.id===me.id && wl.length===1){ rm.disabled=true; rm.title='At least one QMS member must remain — add another member first.'; }
          rm.onclick=function(){
            QMS.setWl(t, wl.filter(function(x){ return x.id!==e.id; })).then(render);
          };
          row.appendChild(rm);
        }
        app.appendChild(row);
      });

      if(meIn){
        app.appendChild(QMS.el('<div class="ghead"><span class="gname">Add from board members</span></div>'));
        var candidates = members.filter(function(m){ return !wl.some(function(e){ return e.id===m.id; }); });
        if(!candidates.length){
          app.appendChild(QMS.el('<div class="empty">Every board member is already authorized.</div>'));
        }
        candidates.forEach(function(m){
          var row = QMS.el('<div class="mrow"><span class="mn">' + QMS.esc(m.fullName||m.username) +
            '</span><span class="mu">@' + QMS.esc(m.username||'') + '</span></div>');
          var ad = QMS.el('<button class="qbtn alt sm">Add</button>');
          ad.onclick=function(){
            QMS.setWl(t, wl.concat([{id:m.id, n:m.fullName||m.username}])).then(render);
          };
          row.appendChild(ad);
          app.appendChild(row);
        });
      }

      app.appendChild(QMS.el('<div class="notice">Heads-up: this whitelist is enforced in the Power-Up\u2019s UI only. ' +
        'A Power-Up without a backend server cannot cryptographically enforce permissions \u2014 it deters casual edits by ' +
        'non-authorized members, but a determined user with board access could bypass it. Controlled records of truth remain in Box.</div>'));
      QMS.fit(t);
    });
  };
  try{ t.render(function(){ QMS.applyTheme(t); }); }catch(e){}
  render();
};

/* ============================================================
   VIEW: overview modal shell — kind resolved to a module handler
   (modules declare: overviews:[{kind, title, collect(t) -> rows}])
============================================================ */
QMS.viewOverview = function(t, app){
  document.body.classList.add('mode-modal');
  var kind = QMS.getParam('kind');
  var def = null;
  Object.keys(QMS.modules).forEach(function(id){
    (QMS.modules[id].overviews||[]).forEach(function(o){ if(o.kind===kind) def=o; });
  });
  if(!def){ app.innerHTML='<div class="empty">Unknown overview.</div>'; return; }
  app.innerHTML = '<div class="ovhead"><span class="ovt">' + QMS.esc(def.title) + '</span><span class="ovn">loading…</span></div>' +
                  '<div class="empty">Scanning cards…</div>';
  Promise.all([ t.lists('id','name'), def.collect(t) ]).then(function(r){
    var lists={}; (r[0]||[]).forEach(function(l){ lists[l.id]=l.name; });
    var rows=r[1]||[];
    app.innerHTML = '<div class="ovhead"><span class="ovt">' + QMS.esc(def.title) + '</span>' +
      '<span class="ovn">' + rows.length + ' card' + (rows.length===1?'':'s') + '</span></div>';
    if(!rows.length){
      app.appendChild(QMS.el('<div class="empty">' + QMS.esc(def.empty||'Nothing to show — all clear.') + '</div>'));
      QMS.fit(t); return;
    }
    rows.forEach(function(row){
      var e = QMS.el('<div class="ove">' +
        '<span class="ovc"><span class="cn">' + QMS.esc(row.name) + '</span>' +
        '<span class="cl">' + QMS.esc(lists[row.idList]||'') + '</span></span>' +
        '<span class="chip ' + (row.color||'gray') + '">' + QMS.esc(row.status) + '</span>' +
        '<span class="ovd num">' + QMS.esc(row.detail||'') + '</span></div>');
      e.onclick=function(){ try{ t.showCard(row.id); }catch(err){} };
      app.appendChild(e);
    });
    QMS.fit(t);
  });
};

/* ============================================================
   VIEW: Power-Up Info — version + latest CHANGELOG.md summary
============================================================ */
QMS.viewInfo = function(t, app){
  document.body.classList.add('mode-popup');
  var show = function(summary, meta){
    app.innerHTML = '<div class="inf">' +
      '<span class="iv">TF-QMS v' + QMS.VERSION + '</span>' +
      '<span class="is">' + QMS.esc(summary) + '</span>' +
      (meta ? '<span class="im">' + QMS.esc(meta) + '</span>' : '') +
      '<span class="im">UC Davis Tech Foundry \u00b7 full history in CHANGELOG.md</span></div>';
    QMS.fit(t);
  };
  show(QMS.LAST_CHANGE, '');
  /* Prefer the live CHANGELOG.md (single source of truth), fall back to constant. */
  fetch(QMS.SELF.replace(/[^\/]*$/, '') + 'CHANGELOG.md?cb=' + Date.now())
    .then(function(r){ return r.ok ? r.text() : null; })
    .then(function(txt){
      if(!txt) return;
      /* first entry = first "## " heading + its first "Summary:" line */
      var m = txt.match(/^## \[?v?([\d.]+)\]?[^\n]*\n([\s\S]*?)(?=\n## |\n*$)/m);
      if(!m) return;
      var body = m[2];
      var sm = body.match(/Summary:\s*(.+)/);
      var dm = body.match(/Date:\s*(.+)/);
      var am = body.match(/Author:\s*(.+)/);
      show(sm ? sm[1].trim() : QMS.LAST_CHANGE,
           [dm&&dm[1].trim(), am&&('by '+am[1].trim())].filter(Boolean).join(' \u00b7 '));
    })
    .catch(function(){});
};
</script>
<script>
/* ============ MODULE: EQUIPMENT MAINTENANCE & CALIBRATION ============ */
(function(){

var TYPES = { cal:'Calibration', pm:'Preventive Maintenance', rep:'Repair', insp:'Inspection' };
var INTERVALS = [30,60,90,180,365];
/* Equipment categories reflect the actual TF fleet across GBSF and Aggie
   Square. Each carries a suggested interval and a PM checklist hint that
   surfaces in the log form — suggestions only, never auto-enforced. */
var CATS = {
  cnc:{ n:'CNC mill / lathe',                   iv:90,  h:'Way lube, coolant concentration & pH, chip/level check, tram & indicate, spindle warm-up.' },
  fdm:{ n:'FDM printer',                        iv:90,  h:'Nozzle & hotend/PTFE, belt tension, bed level & build surface, Z-axis lube.' },
  sla:{ n:'SLA printer',                        iv:90,  h:'Resin tank & wiper condition, optical window/glass, resin filter, firmware current.' },
  sls:{ n:'SLS / MJF printer',                  iv:30,  h:'Printheads & lamps per OEM schedule, sieve/recycle station, chamber glass, filters.' },
  pj: { n:'PolyJet printer',                    iv:30,  h:'Head cleaning & pattern test, roller & wiper, UV lamp hours.' },
  lc: { n:'Laser cutter',                       iv:30,  h:'Lens & mirror optics, rail/rack cleaning, extraction & filtration flow check, beam alignment. Filtration/extraction is also a fire-safety control — log it every time.' },
  met:{ n:'Metrology (calipers, mics, gauges)', iv:365, h:'External NIST-traceable calibration. Attach the cert (Box link) — that link is the traceability chain.' },
  pp: { n:'Post-processing (wash/cure, dye, blast)', iv:90, h:'Solvent/media condition, seals & gaskets, verify timers & temps against setpoints.' },
  oth:{ n:'Other', iv:null, h:'' }
};
/* Calibration as-found/as-left, the distinction reviewers actually ask for. */
var CAL_RESULTS = { it:'Found in tolerance', adj:'Adjusted to tolerance', oot:'Out of tolerance — limited / removed from service' };
var DUE_SOON_DAYS = 14;

function getMt(t, cardId){
  var g = cardId ? t.get(cardId,'shared','mt') : t.get('card','shared','mt');
  return g.then(function(v){ return (v&&typeof v==='object')?v:{}; }).catch(function(){ return {}; });
}
function getLog(t){
  return t.get('card','shared','mtl').then(function(v){ return Array.isArray(v)?v:[]; }).catch(function(){ return []; });
}
function nextDue(mt){
  if(!mt || !mt.ls || !mt.iv) return null;
  return QMS.addDays(mt.ls, mt.iv);
}
function status(mt){
  var due = nextDue(mt);
  if(!due) return { s:'none', due:null };
  var d = QMS.daysUntil(due);
  if(d < 0) return { s:'red', due:due, d:d };
  if(d <= DUE_SOON_DAYS) return { s:'yellow', due:due, d:d };
  return { s:'green', due:due, d:d };
}

QMS.register({
  id: 'equipment',

  /* ---- card-front badge: the primary at-a-glance indicator ---- */
  badges: function(t){
    return getMt(t).then(function(mt){
      var st = status(mt);
      if(st.s==='none')   return [{ text:'Maint: not logged', color:'light-gray', refresh:3600 }];
      if(st.s==='red')    return [{ text:'Maint OVERDUE \u00b7 ' + QMS.fmtDate(st.due), color:'red', refresh:3600 }];
      if(st.s==='yellow') return [{ text:'Maint due ' + QMS.fmtDate(st.due), color:'yellow', refresh:3600 }];
      return [{ text:'Maint OK \u00b7 next ' + QMS.fmtDate(st.due), color:'green', refresh:3600 }];
    });
  },

  /* ---- board button: Maintenance Overview (yellow + red cards) ---- */
  boardButtons: [ { text:'Maintenance Overview', kind:'maint' } ],
  overviews: [{
    kind:'maint',
    title:'Maintenance Overview \u2014 due soon & overdue',
    empty:'No equipment is due within ' + DUE_SOON_DAYS + ' days or overdue. All green.',
    collect: function(t){
      return t.cards('id','name','idList').then(function(cards){
        return Promise.all(cards.map(function(c){
          return getMt(t, c.id).then(function(mt){
            var st = status(mt);
            if(st.s!=='red' && st.s!=='yellow') return null;
            return { id:c.id, name:c.name, idList:c.idList,
                     status: st.s==='red' ? 'Overdue' : 'Due soon',
                     color: st.s,
                     detail: (st.s==='red' ? Math.abs(st.d)+'d overdue \u00b7 ' : 'in '+st.d+'d \u00b7 ') + QMS.fmtDate(st.due),
                     sort: st.d };
          });
        })).then(function(rows){
          return rows.filter(Boolean).sort(function(a,b){ return a.sort-b.sort; });
        });
      });
    }
  }],

  /* ---- card-back section block ---- */
  section: function(t, mount, ctx){
    return Promise.all([getMt(t), getLog(t)]).then(function(r){
      var mt=r[0], log=r[1], st=status(mt);
      var chip = { none:['gray','Not logged'], green:['green','Up to date'],
                   yellow:['yellow','Due soon'], red:['red','Overdue'] }[st.s];
      mount.innerHTML =
        '<div class="ghead"><span class="gname">Maintenance &amp; Calibration</span>' +
        '<span class="gsub"><span class="chip ' + chip[0] + '">' + chip[1] + '</span></span></div>' +
        '<div class="fieldgrid">' +
        '<span class="fk">Equipment category</span><span class="fv' + (mt.ct?'':' empty') + '">' + ((CATS[mt.ct]||{}).n||'\u2014 not set') + '</span>' +
        '<span class="fk">Last serviced/calibrated</span><span class="fv' + (mt.ls?'':' empty') + '">' + (mt.ls?QMS.fmtDate(mt.ls):'\u2014 none logged') + '</span>' +
        '<span class="fk">Maintenance interval</span><span class="fv' + (mt.iv?'':' empty') + '">' + (mt.iv ? (mt.iv + ' days' + (INTERVALS.indexOf(+mt.iv)<0?' (custom)':'')) : '\u2014 not set') + '</span>' +
        '<span class="fk">Next due (auto)</span><span class="fv' + (st.due?'':' empty') + '">' + (st.due ? QMS.fmtDate(st.due) + (st.d!=null ? (st.d<0 ? ' \u00b7 '+Math.abs(st.d)+'d overdue' : ' \u00b7 in '+st.d+'d') : '') : '\u2014') + '</span>' +
        '<span class="fk">Last maintenance type</span><span class="fv' + (mt.ty?'':' empty') + '">' + (TYPES[mt.ty]||'\u2014') + '</span>' +
        '</div>';

      /* actions row */
      var acts = QMS.el('<div class="secacts"></div>');
      var logBtn = QMS.el('<button class="qbtn save sm">Log Maintenance Event</button>');
      if(!ctx.wl){
        logBtn.disabled = true;
        acts.appendChild(logBtn);
        acts.appendChild(QMS.el('<span class="why">QMS-authorized members only.</span>'));
      } else {
        logBtn.onclick = function(){
          t.popup({ title:'Log Maintenance Event', url:QMS.url('maintlog'), height:430 });
        };
        acts.appendChild(logBtn);
      }
      mount.appendChild(acts);

      /* due-date sync state (native card due mirrors Next Due) */
      if(QMS.dueSyncAvailable()){
        var api; try{ api = t.getRestApi(); }catch(e){ api=null; }
        if(api){
          api.isAuthorized().then(function(ok){
            if(ok) return;
            var row = QMS.el('<div class="secacts"><span class="why">Native card due-date sync is off for you \u2014 authorize once to let logged events also set Trello\u2019s own due date (and its reminders).</span></div>');
            var b = QMS.el('<button class="link blue">Enable</button>');
            b.onclick = function(){ QMS.authorizeDueSync(t).then(function(){ ctx.refresh(); }, function(){}); };
            row.appendChild(b);
            mount.appendChild(row);
            QMS.fit(t);
          }).catch(function(){});
        }
      } else {
        mount.appendChild(QMS.el('<div class="secacts"><span class="why">Due-date sync unavailable \u2014 no API key configured (see README \u00a7 due-date sync). Badges still track Next Due.</span></div>'));
      }

      /* running history — append-only */
      mount.appendChild(QMS.el('<div class="loghead"><span class="sv-label">Maintenance log</span>' +
        '<span class="why">' + log.length + ' entr' + (log.length===1?'y':'ies') + ' \u00b7 append-only</span></div>'));
      if(log.some(function(e){ return e && (e.c || e.rl); })){
        mount.appendChild(QMS.el('<div class="capwarn">Storage budget reached \u2014 the oldest entries were compacted (dates, types, and authors preserved where possible). Archive full history to Box.</div>'));
      }
      if(!log.length){
        mount.appendChild(QMS.el('<div class="empty">No maintenance or calibration events logged yet.</div>'));
      }
      log.forEach(function(e, i){
        if(e && e.rl){
          mount.appendChild(QMS.el('<div class="le"><span class="lts"><span class="d">\u2026</span></span>' +
            '<span class="lbody"><div class="lnote" style="font-style:italic">' + e.rl + ' older entr' + (e.rl===1?'y':'ies') +
            ' rolled up (' + QMS.esc(QMS.fmtDate(e.f)) + ' \u2013 ' + QMS.esc(QMS.fmtDate(e.l)) + ') to stay within Trello\u2019s storage cap.</div></span></div>'));
          return;
        }
        var row = QMS.el('<div class="le' + (e.ed?' edited':'') + '">' +
          '<span class="lts"><span class="d">' + QMS.esc(QMS.fmtDate(e.d)) + '</span>' +
          (e.ed?'<span>edited</span>':'') + '</span>' +
          '<span class="lbody"><span class="l1"><span class="lnm">' + QMS.esc(TYPES[e.ty]||e.ty||'') + (e.cr?' \u00b7 '+QMS.esc(CAL_RESULTS[e.cr]||e.cr):'') + '</span>' +
          '<span class="lby">' + QMS.esc(e.byN||'') + '</span></span>' +
          (e.n ? '<div class="lnote">' + QMS.esc(e.n) + '</div>' : '') +
          (e.att ? '<a href="' + QMS.esc(e.att) + '" target="_blank" rel="noopener">attachment \u2197</a>' : '') +
          (e.c ? '<div class="lnote" style="font-style:italic">note compacted for storage</div>' : '') +
          '</span></div>');
        if(ctx.wl && QMS.canEdit(e, ctx.me.id)){
          var eb = QMS.el('<button class="link ledit">edit</button>');
          eb.onclick = function(){
            t.popup({ title:'Edit Maintenance Entry', url:QMS.url('maintlog',{edit:e.t}), height:430 });
          };
          row.appendChild(eb);
        }
        mount.appendChild(row);
      });
    });
  }
});

/* ---- popup view: Log Maintenance Event / edit-within-window ---- */
QMS.views.maintlog = function(t, app){
  document.body.classList.add('mode-popup');
  var editTs = QMS.getParam('edit') ? +QMS.getParam('edit') : null;

  Promise.all([getMt(t), getLog(t), QMS.me(t), QMS.isWl(t)]).then(function(r){
    var mt=r[0], log=r[1], me=r[2], wl=r[3];
    var editing = editTs ? log.find(function(e){ return e.t===editTs; }) : null;
    if(editTs && (!editing || !QMS.canEdit(editing, me.id))){
      app.innerHTML = '<div class="empty">This entry can no longer be edited \u2014 the ' +
        Math.round(QMS.EDIT_WINDOW_MS/3600000) + '-hour author window has closed. Log entries are never deleted; ' +
        'add a new entry to correct the record.</div>';
      QMS.fit(t); return;
    }
    if(!wl){
      app.innerHTML = '<div class="empty">Only QMS-authorized members can log maintenance events.</div>';
      QMS.fit(t); return;
    }

    var curIv = editing ? mt.iv : mt.iv;   /* interval prefilled from card either way */
    var isStd = curIv && INTERVALS.indexOf(+curIv)>=0;
    app.innerHTML = '';
    var f = QMS.el('<div class="frm">' +
      '<div class="frow"><label>Equipment category</label><select class="min" id="fct">' +
        '<option value="">\u2014 select \u2014</option>' +
        Object.keys(CATS).map(function(k){ return '<option value="'+k+'">'+CATS[k].n+'</option>'; }).join('') +
      '</select></div>' +
      '<div class="frow" id="fhintRow" hidden><span class="why" id="fhint"></span></div>' +
      '<div class="fgrid2">' +
        '<div class="frow"><label>Event date</label><input class="min" id="fd" type="date"></div>' +
        '<div class="frow"><label>Maintenance type</label><select class="min" id="fty">' +
          Object.keys(TYPES).map(function(k){ return '<option value="'+k+'">'+TYPES[k]+'</option>'; }).join('') +
        '</select></div>' +
      '</div>' +
      '<div class="frow" id="fcrRow" hidden><label>Calibration result (as-left)</label><select class="min" id="fcr">' +
        Object.keys(CAL_RESULTS).map(function(k){ return '<option value="'+k+'">'+CAL_RESULTS[k]+'</option>'; }).join('') +
      '</select></div>' +
      '<div class="fgrid2">' +
        '<div class="frow"><label>Maintenance interval</label><select class="min" id="fiv">' +
          INTERVALS.map(function(d){ return '<option value="'+d+'">'+d+' days</option>'; }).join('') +
          '<option value="custom">Custom\u2026</option>' +
        '</select></div>' +
        '<div class="frow" id="fcustomRow" hidden><label>Custom interval (days)</label>' +
          '<input class="min num" id="fcustom" type="number" min="1" step="1" placeholder="days"></div>' +
      '</div>' +
      '<div class="frow"><label>Notes</label><textarea class="min" id="fn" placeholder="What was done, readings, parts, standards used\u2026"></textarea></div>' +
      '<div class="frow"><label>Attachment link (optional \u2014 never required)</label>' +
        '<input class="min" id="fatt" type="url" placeholder="https:// \u2026 Box link to cert, report, photo"></div>' +
      '<div class="fwarn" id="fwarn" hidden></div>' +
      '<div class="facts"><span class="note" id="fnote"></span>' +
        '<button class="qbtn cancel" id="fcancel">Cancel</button>' +
        '<button class="qbtn save" id="fsave">' + (editing?'Save changes':'Log event') + '</button></div>' +
      '</div>');
    app.appendChild(f);

    var $ = function(s){ return f.querySelector(s); };
    $('#fd').value = editing ? editing.d : QMS.todayStr();
    $('#fty').value = editing ? (editing.ty||'pm') : (mt.ty||'pm');
    $('#fct').value = mt.ct||'';
    if(editing && editing.cr) $('#fcr').value = editing.cr;
    var syncCat = function(fromUser){
      var c = CATS[$('#fct').value];
      $('#fhintRow').hidden = !(c && c.h);
      if(c && c.h) $('#fhint').textContent = c.n + ' \u2014 typical checks: ' + c.h;
      /* suggest (not force) the category's interval when the user picks it */
      if(fromUser && c && c.iv && INTERVALS.indexOf(c.iv)>=0){ $('#fiv').value=String(c.iv); $('#fcustomRow').hidden=true; }
      QMS.fit(t);
    };
    var syncCalRes = function(){ $('#fcrRow').hidden = $('#fty').value!=='cal'; QMS.fit(t); };
    $('#fct').onchange = function(){ syncCat(true); };
    $('#fty').onchange = syncCalRes;
    syncCat(false); syncCalRes();
    if(curIv && isStd) $('#fiv').value = String(curIv);
    else if(curIv){ $('#fiv').value='custom'; $('#fcustomRow').hidden=false; $('#fcustom').value=curIv; }
    $('#fn').value = editing ? (editing.n||'') : '';
    $('#fatt').value = editing ? (editing.att||'') : '';
    $('#fiv').onchange = function(){ $('#fcustomRow').hidden = this.value!=='custom'; QMS.fit(t); };
    var noteBits = [];
    if(editing) noteBits.push('Editing your entry \u2014 window closes ' + Math.round((editing.t+QMS.EDIT_WINDOW_MS-Date.now())/3600000) + 'h from now');
    else noteBits.push('Technician: ' + (me.fullName||me.username));
    $('#fnote').textContent = noteBits.join(' \u00b7 ');

    $('#fcancel').onclick = function(){ t.closePopup(); };
    $('#fsave').onclick = function(){
      var d = $('#fd').value;
      var ivRaw = $('#fiv').value;
      var iv = ivRaw==='custom' ? parseInt($('#fcustom').value,10) : parseInt(ivRaw,10);
      var warn = $('#fwarn');
      if(!d){ warn.textContent='Event date is required.'; warn.hidden=false; QMS.fit(t); return; }
      if(!iv || iv<1){ warn.textContent='Enter a maintenance interval in days.'; warn.hidden=false; QMS.fit(t); return; }
      var att = $('#fatt').value.trim();
      if(att && !/^https?:\/\//i.test(att)){ warn.textContent='Attachment must be a full http(s) link.'; warn.hidden=false; QMS.fit(t); return; }
      /* soft nudge, not a blocker: a calibration without a cert link breaks
         the traceability chain \u2014 confirm once, then save anyway */
      if($('#fty').value==='cal' && !att && !$('#fsave').dataset.nudged){
        $('#fsave').dataset.nudged='1';
        warn.textContent='No cert/report link attached for this calibration \u2014 the Box link is the traceability record. Click \u201c' + (editing?'Save changes':'Log event') + '\u201d again to save without one.';
        warn.hidden=false; QMS.fit(t); return;
      }
      warn.hidden=true;
      $('#fsave').disabled = true;

      var ct = $('#fct').value || undefined;
      var cr = ($('#fty').value==='cal') ? $('#fcr').value : undefined;
      var newLog, entry;
      if(editing){
        entry = editing;
        entry.d = d; entry.ty = $('#fty').value; entry.n = $('#fn').value.trim();
        if(att) entry.att = att; else delete entry.att;
        if(cr) entry.cr = cr; else delete entry.cr;
        entry.ed = Date.now();
        newLog = log;
      } else {
        entry = { t:Date.now(), d:d, ty:$('#fty').value, by:me.id, byN:(me.fullName||me.username) };
        var n = $('#fn').value.trim(); if(n) entry.n = n;
        if(att) entry.att = att;
        if(cr) entry.cr = cr;
        newLog = QMS.appendLog(log, entry).list;
      }

      /* the most recent event date (log may be edited out of order) drives Last Serviced */
      var latest = newLog.reduce(function(a,e){ return (e && !e.rl && e.d && (!a || e.d>a)) ? e.d : a; }, null);
      var newMt = { ls: latest, iv: iv, ty: entry.ty }; if(ct) newMt.ct = ct;
      var due = nextDue(newMt);

      Promise.all([
        t.set('card','shared','mtl', newLog),
        t.set('card','shared','mt',  newMt)
      ]).then(function(){
        /* mirror Next Due onto Trello's native due date so assignees get
           Trello's own reminders too; skipped gracefully if not authorized */
        return due ? QMS.syncNativeDue(t, due) : null;
      }).then(function(){ t.closePopup(); },
              function(){ t.closePopup(); });
    };
    QMS.fit(t);
  });
};

})();
</script>
<script>
/* ============ MODULE: PROJECT INTAKE ============ */
(function(){

var PTYPES = { rc:'Recharge', gr:'Grant-Funded', cl:'Class-Instructional', il:'Internal Lab', ot:'Other' };
var PRIOS  = { std:'Standard', rush:'Rush', hold:'Hold' };
var STATS  = { 'new':'New', acc:'Accepted', dec:'Declined' };
/* The TF service catalog — what a request can actually ask for. Multi-
   select: real jobs routinely span services (print + finish, scan + print). */
var SERVICES = { cnc:'CNC machining', fdm:'FDM printing', sla:'SLA printing', mjf:'SLS / MJF printing',
                 pj:'PolyJet printing', lz:'Laser cutting', dcm:'DICOM / segmentation',
                 eng:'Engineering / design', fin:'Finishing / post-processing' };
var SITES = { gbsf:'Davis — GBSF', ags:'Sacramento — Aggie Square' };
function svLabels(d){
  return (d && Array.isArray(d.sv) && d.sv.length)
    ? d.sv.map(function(k){ return SERVICES[k]||k; }).join(', ') : null;
}

function getIn(t, cardId){
  var g = cardId ? t.get(cardId,'shared','in') : t.get('card','shared','in');
  return g.then(function(v){ return (v&&typeof v==='object')?v:null; }).catch(function(){ return null; });
}
function stOf(d){ return (d && d.st) ? d.st : 'new'; }

QMS.register({
  id: 'intake',

  /* ---- badge: grey New / green Accepted / red Declined ---- */
  badges: function(t){
    return getIn(t).then(function(d){
      var st = stOf(d);
      var out;
      if(st==='acc') out = [{ text:'Intake: Accepted', color:'green' }];
      else if(st==='dec') out = [{ text:'Intake: Declined', color:'red' }];
      else out = [{ text:'Intake: New', color:'light-gray' }];
      /* rush work should be loud on a queue board */
      if(d && d.pr==='rush' && st!=='dec') out.push({ text:'RUSH', color:'orange' });
      return out;
    });
  },

  /* ---- board button: Intake Queue (every Job/Request still New) ---- */
  boardButtons: [ { text:'Intake Queue', kind:'intake' } ],
  overviews: [{
    kind:'intake',
    title:'Intake Queue \u2014 new requests pending review',
    empty:'No pending intake \u2014 every job/request card has been accepted or declined.',
    collect: function(t){
      return t.cards('id','name','idList').then(function(cards){
        return Promise.all(cards.map(function(c){
          return Promise.all([ t.get(c.id,'shared','qt'), getIn(t, c.id) ]).then(function(r){
            if(r[0]!=='job') return null;              /* jobs only */
            var d=r[1];
            if(stOf(d)!=='new') return null;
            return { id:c.id, name:c.name, idList:c.idList,
                     status:'New', color:'gray',
                     detail: [ d && d.dt ? ('intake ' + QMS.fmtDate(d.dt)) : 'intake not entered',
                               d && d.pr==='rush' ? 'RUSH' : null,
                               svLabels(d) ].filter(Boolean).join(' \u00b7 '),
                     sort: (d && d.pr==='rush' ? '0' : '1') + (d && d.dt ? d.dt : '9999') };
          });
        })).then(function(rows){
          return rows.filter(Boolean).sort(function(a,b){ return a.sort<b.sort?-1:1; });
        });
      });
    }
  }],

  /* ---- card-back section block ---- */
  section: function(t, mount, ctx){
    return getIn(t).then(function(d){
      var st = stOf(d);
      var chip = { 'new':['gray','New \u00b7 pending review'], acc:['green','Accepted'], dec:['red','Declined'] }[st];
      var v = function(val, fmt){
        return val ? '<span class="fv">' + QMS.esc(fmt?fmt(val):val) + '</span>' : '<span class="fv empty">\u2014</span>';
      };
      mount.innerHTML =
        '<div class="ghead"><span class="gname">Project Intake</span>' +
        '<span class="gsub"><span class="chip ' + chip[0] + '">' + chip[1] + '</span></span></div>' +
        '<div class="fieldgrid">' +
        '<span class="fk">Requester</span>' + v(d&&d.rq) +
        '<span class="fk">Project type</span>' + v(d&&PTYPES[d.pt]) +
        '<span class="fk">Services requested</span>' + v(svLabels(d)) +
        '<span class="fk">Site</span>' + v(d&&SITES[d.si]) +
        '<span class="fk">Intake date</span>' + v(d&&d.dt, QMS.fmtDate) +
        '<span class="fk">Priority</span>' + v(d&&PRIOS[d.pr]) +
        '<span class="fk">Requested due date</span>' + v(d&&d.rd, QMS.fmtDate) +
        '<span class="fk">Billing reference</span>' + v(d&&d.br) +
        (st==='dec' ? '<span class="fk">Decline reason</span>' + v(d&&d.dr) : '') +
        '</div>';
      var acts = QMS.el('<div class="secacts"></div>');
      var b = QMS.el('<button class="qbtn ' + (d?'alt':'save') + ' sm">' + (d?'Edit Intake Info':'Enter Intake Info') + '</button>');
      if(!ctx.wl){
        b.disabled = true;
        acts.appendChild(b);
        acts.appendChild(QMS.el('<span class="why">QMS-authorized members only.</span>'));
      } else {
        b.onclick = function(){
          t.popup({ title:'Project Intake', url:QMS.url('intake'), height:430 });
        };
        acts.appendChild(b);
      }
      mount.appendChild(acts);
    });
  }
});

/* ---- popup view: guided intake form (all fields in one place) ---- */
QMS.views.intake = function(t, app){
  document.body.classList.add('mode-popup');
  Promise.all([getIn(t), QMS.isWl(t)]).then(function(r){
    var d=r[0]||{}, wl=r[1];
    if(!wl){
      app.innerHTML = '<div class="empty">Only QMS-authorized members can edit intake info.</div>';
      QMS.fit(t); return;
    }
    var opts = function(map, sel){
      return Object.keys(map).map(function(k){
        return '<option value="'+k+'"'+(k===sel?' selected':'')+'>'+map[k]+'</option>';
      }).join('');
    };
    app.innerHTML='';
    var sv = Array.isArray(d.sv) ? d.sv : [];
    var f = QMS.el('<div class="frm">' +
      '<div class="frow"><label>Requester name</label><input class="min" id="frq" type="text" placeholder="e.g. Bofeng Pan"></div>' +
      '<div class="fgrid2">' +
        '<div class="frow"><label>Project type</label><select class="min" id="fpt">' + opts(PTYPES, d.pt||'rc') + '</select></div>' +
        '<div class="frow"><label>Site</label><select class="min" id="fsi">' + opts(SITES, d.si||'gbsf') + '</select></div>' +
      '</div>' +
      '<div class="frow"><label>Services requested</label><div class="ckgrid" id="fsv">' +
        Object.keys(SERVICES).map(function(k){
          return '<label class="ck"><input type="checkbox" value="'+k+'"'+(sv.indexOf(k)>=0?' checked':'')+'> '+SERVICES[k]+'</label>';
        }).join('') + '</div></div>' +
      '<div class="fgrid2">' +
        '<div class="frow"><label>Intake date</label><input class="min" id="fdt" type="date"></div>' +
        '<div class="frow"><label>Requested due date</label><input class="min" id="frd" type="date"></div>' +
      '</div>' +
      '<div class="fgrid2">' +
        '<div class="frow"><label>Priority</label><select class="min" id="fpr">' + opts(PRIOS, d.pr||'std') + '</select></div>' +
        '<div class="frow"><label>Intake status</label><select class="min" id="fst">' + opts(STATS, d.st||'new') + '</select></div>' +
      '</div>' +
      '<div class="frow"><label>Billing reference</label><input class="min" id="fbr" type="text" placeholder="Aggie Enterprise chart string / PO / grant fund"></div>' +
      '<div class="frow" id="fdrRow" hidden><label>Decline reason</label><input class="min" id="fdr" type="text" placeholder="Why this request was declined"></div>' +
      '<div class="fwarn" id="fwarn" hidden></div>' +
      '<div class="facts">' +
        '<button class="qbtn cancel" id="fcancel">Cancel</button>' +
        '<button class="qbtn save" id="fsave">Save intake</button></div>' +
      '</div>');
    app.appendChild(f);
    var $ = function(s){ return f.querySelector(s); };
    $('#frq').value = d.rq||'';
    $('#fdt').value = d.dt||QMS.todayStr();
    $('#frd').value = d.rd||'';
    $('#fbr').value = d.br||'';
    $('#fdr').value = d.dr||'';
    var syncDec = function(){ $('#fdrRow').hidden = $('#fst').value!=='dec'; QMS.fit(t); };
    $('#fst').onchange = syncDec; syncDec();

    $('#fcancel').onclick = function(){ t.closePopup(); };
    $('#fsave').onclick = function(){
      var warn = $('#fwarn');
      var svSel = Array.prototype.slice.call(f.querySelectorAll('#fsv input:checked')).map(function(i){ return i.value; });
      var out = { rq:$('#frq').value.trim(), pt:$('#fpt').value, si:$('#fsi').value, dt:$('#fdt').value,
                  pr:$('#fpr').value, rd:$('#frd').value||undefined, st:$('#fst').value };
      if(svSel.length) out.sv = svSel;
      var br=$('#fbr').value.trim(); if(br) out.br=br;
      var dr=$('#fdr').value.trim(); if(dr) out.dr=dr;
      if(!out.rq){ warn.textContent='Requester name is required.'; warn.hidden=false; QMS.fit(t); return; }
      if(!out.dt){ warn.textContent='Intake date is required.'; warn.hidden=false; QMS.fit(t); return; }
      if(out.st==='dec' && !out.dr){ warn.textContent='Give a short decline reason \u2014 it stays on the card as the record of why.'; warn.hidden=false; QMS.fit(t); return; }
      /* soft nudge: accepted recharge work without a billing reference is
         un-invoiceable \u2014 confirm once, then allow */
      if(out.st==='acc' && out.pt==='rc' && !out.br && !$('#fsave').dataset.nudged){
        $('#fsave').dataset.nudged='1';
        warn.textContent='Accepting Recharge work with no billing reference \u2014 nothing to invoice against. Click \u201cSave intake\u201d again to accept anyway.';
        warn.hidden=false; QMS.fit(t); return;
      }
      if(!out.rd) delete out.rd;
      warn.hidden=true;
      $('#fsave').disabled=true;
      t.set('card','shared','in', out).then(function(){ t.closePopup(); }, function(){ t.closePopup(); });
    };
    QMS.fit(t);
  });
};

})();
</script>
<script>
/* ============ MODULE: INSPECTION & VERIFICATION ============ */
(function(){

var RESULTS = { pass:'Pass', fail:'Fail', hold:'Hold' };
var ST_LABEL = { ns:'Not Started', pass:'Pass', fail:'Fail', hold:'Hold' };
/* Hold/Fail reason codes — a fixed taxonomy so patterns are countable
   across jobs (which process fails most, how often clients stall work)
   instead of a pile of unique free-text strings. Details stay free-text. */
var REASONS = {
  dim:'Dimensional out of tolerance', fin:'Surface / finish defect',
  prt:'Print / machine failure',      mat:'Material nonconformance',
  pp: 'Damaged in post-processing',   cli:'Awaiting client input / approval',
  chg:'Client change request',        eq: 'Equipment down',
  doc:'Documentation incomplete',     oth:'Other'
};

function getIv(t, cardId){
  var g = cardId ? t.get(cardId,'shared','iv') : t.get('card','shared','iv');
  return g.then(function(v){ return (v&&typeof v==='object')?v:null; }).catch(function(){ return null; });
}
function getLog(t){
  return t.get('card','shared','ivl').then(function(v){ return Array.isArray(v)?v:[]; }).catch(function(){ return []; });
}
function stOf(d){ return (d && d.st) ? d.st : 'ns'; }

QMS.register({
  id: 'inspection',

  /* ---- badge: second card-front badge, shown alongside Intake's ---- */
  badges: function(t){
    return getIv(t).then(function(d){
      var st = stOf(d);
      if(st==='pass') return [{ text:'Inspection: Pass', color:'green' }];
      if(st==='fail') return [{ text:'Inspection: Fail', color:'red' }];
      if(st==='hold') return [{ text:'Inspection: Hold', color:'orange' }];
      return [{ text:'Inspection: Not Started', color:'light-gray' }];
    });
  },

  /* ---- board button: Hold & Fail Overview ---- */
  boardButtons: [ { text:'Hold & Fail Overview', kind:'holdfail' } ],
  overviews: [{
    kind:'holdfail',
    title:'Inspection \u2014 Hold & Fail',
    empty:'No job/request cards are currently on Hold or Failed. All clear.',
    collect: function(t){
      return t.cards('id','name','idList').then(function(cards){
        return Promise.all(cards.map(function(c){
          return Promise.all([ t.get(c.id,'shared','qt'), getIv(t, c.id) ]).then(function(r){
            if(r[0]!=='job') return null;
            var d=r[1], st=stOf(d);
            if(st!=='hold' && st!=='fail') return null;
            return { id:c.id, name:c.name, idList:c.idList,
                     status: ST_LABEL[st],
                     color: st==='fail' ? 'red' : 'orange',
                     detail: [d&&d.d?QMS.fmtDate(d.d):null, d&&REASONS[d.rc], d&&d.rs?d.rs:null].filter(Boolean).join(' \u00b7 '),
                     sort: (st==='fail'?'0':'1') + (d&&d.d||'') };
          });
        })).then(function(rows){
          return rows.filter(Boolean).sort(function(a,b){ return a.sort<b.sort?-1:1; });
        });
      });
    }
  }],

  /* ---- card-back section block ---- */
  section: function(t, mount, ctx){
    return Promise.all([getIv(t), getLog(t)]).then(function(r){
      var d=r[0], log=r[1], st=stOf(d);
      var chip = { ns:['gray','Not Started'], pass:['green','Pass'],
                   fail:['red','Fail'], hold:['orange','Hold'] }[st];
      mount.innerHTML =
        '<div class="ghead"><span class="gname">Inspection &amp; Verification</span>' +
        '<span class="gsub"><span class="chip ' + chip[0] + '">' + chip[1] + '</span></span></div>' +
        '<div class="fieldgrid">' +
        '<span class="fk">Inspection status</span><span class="fv">' + ST_LABEL[st] + '</span>' +
        '<span class="fk">Inspector</span><span class="fv' + (d&&d.byN?'':' empty') + '">' + QMS.esc(d&&d.byN||'\u2014') + '</span>' +
        '<span class="fk">Inspection date</span><span class="fv' + (d&&d.d?'':' empty') + '">' + (d&&d.d?QMS.fmtDate(d.d):'\u2014') + '</span>' +
        ((st==='hold'||st==='fail') ?
          '<span class="fk">Hold/Fail reason</span><span class="fv' + ((d&&(d.rc||d.rs))?'':' empty') + '">' +
            QMS.esc([d&&REASONS[d.rc], d&&d.rs].filter(Boolean).join(' \u2014 ')||'\u2014 not given') + '</span>' : '') +
        '</div>';

      var acts = QMS.el('<div class="secacts"></div>');
      var b = QMS.el('<button class="qbtn save sm">Log Inspection Result</button>');
      if(!ctx.wl){
        b.disabled = true;
        acts.appendChild(b);
        acts.appendChild(QMS.el('<span class="why">QMS-authorized members only.</span>'));
      } else {
        b.onclick = function(){
          t.popup({ title:'Log Inspection Result', url:QMS.url('inspectlog'), height:420 });
        };
        acts.appendChild(b);
      }
      mount.appendChild(acts);

      mount.appendChild(QMS.el('<div class="loghead"><span class="sv-label">Inspection history</span>' +
        '<span class="why">' + log.length + ' entr' + (log.length===1?'y':'ies') + ' \u00b7 append-only</span></div>'));
      if(log.some(function(e){ return e && (e.c || e.rl); })){
        mount.appendChild(QMS.el('<div class="capwarn">Storage budget reached \u2014 the oldest entries were compacted (dates, results, and inspectors preserved where possible). Archive full history to Box.</div>'));
      }
      if(!log.length){
        mount.appendChild(QMS.el('<div class="empty">No inspections logged yet.</div>'));
      }
      log.forEach(function(e){
        if(e && e.rl){
          mount.appendChild(QMS.el('<div class="le"><span class="lts"><span class="d">\u2026</span></span>' +
            '<span class="lbody"><div class="lnote" style="font-style:italic">' + e.rl + ' older entr' + (e.rl===1?'y':'ies') +
            ' rolled up (' + QMS.esc(QMS.fmtDate(e.f)) + ' \u2013 ' + QMS.esc(QMS.fmtDate(e.l)) + ') to stay within Trello\u2019s storage cap.</div></span></div>'));
          return;
        }
        var rc = e.r==='pass'?'green': e.r==='fail'?'red':'orange';
        var row = QMS.el('<div class="le' + (e.ed?' edited':'') + '">' +
          '<span class="lts"><span class="d">' + QMS.esc(QMS.fmtDate(e.d)) + '</span>' +
          (e.ed?'<span>edited</span>':'') + '</span>' +
          '<span class="lbody"><span class="l1"><span class="chip ' + rc + '">' + QMS.esc(RESULTS[e.r]||e.r||'') + '</span>' +
          '<span class="lby">' + QMS.esc(e.byN||'') + '</span></span>' +
          ((e.rc||e.rs) ? '<div class="lnote">Reason: ' + QMS.esc([REASONS[e.rc], e.rs].filter(Boolean).join(' \u2014 ')) + '</div>' : '') +
          (e.tl ? '<div class="lnote">Measured with: ' + QMS.esc(e.tl) + '</div>' : '') +
          (e.n ? '<div class="lnote">' + QMS.esc(e.n) + '</div>' : '') +
          (e.att ? '<a href="' + QMS.esc(e.att) + '" target="_blank" rel="noopener">attachment \u2197</a>' : '') +
          (e.c ? '<div class="lnote" style="font-style:italic">note compacted for storage</div>' : '') +
          '</span></div>');
        if(ctx.wl && QMS.canEdit(e, ctx.me.id)){
          var eb = QMS.el('<button class="link ledit">edit</button>');
          eb.onclick = function(){
            t.popup({ title:'Edit Inspection Entry', url:QMS.url('inspectlog',{edit:e.t}), height:420 });
          };
          row.appendChild(eb);
        }
        mount.appendChild(row);
      });
    });
  }
});

/* ---- popup view: Log Inspection Result / edit-within-window ---- */
QMS.views.inspectlog = function(t, app){
  document.body.classList.add('mode-popup');
  var editTs = QMS.getParam('edit') ? +QMS.getParam('edit') : null;

  Promise.all([getLog(t), QMS.me(t), QMS.isWl(t)]).then(function(r){
    var log=r[0], me=r[1], wl=r[2];
    var editing = editTs ? log.find(function(e){ return e.t===editTs; }) : null;
    if(editTs && (!editing || !QMS.canEdit(editing, me.id))){
      app.innerHTML = '<div class="empty">This entry can no longer be edited \u2014 the ' +
        Math.round(QMS.EDIT_WINDOW_MS/3600000) + '-hour author window has closed. Log entries are never deleted; ' +
        'log a new result to correct the record.</div>';
      QMS.fit(t); return;
    }
    if(!wl){
      app.innerHTML = '<div class="empty">Only QMS-authorized members can log inspection results.</div>';
      QMS.fit(t); return;
    }

    app.innerHTML='';
    var f = QMS.el('<div class="frm">' +
      '<div class="fgrid2">' +
        '<div class="frow"><label>Inspection date</label><input class="min" id="fd" type="date"></div>' +
        '<div class="frow"><label>Result</label><select class="min" id="fr">' +
          Object.keys(RESULTS).map(function(k){ return '<option value="'+k+'">'+RESULTS[k]+'</option>'; }).join('') +
        '</select></div>' +
      '</div>' +
      '<div class="frow" id="frcRow" hidden><label>Hold/Fail reason</label><select class="min" id="frc">' +
        '<option value="">\u2014 select \u2014</option>' +
        Object.keys(REASONS).map(function(k){ return '<option value="'+k+'">'+REASONS[k]+'</option>'; }).join('') +
      '</select></div>' +
      '<div class="frow" id="frsRow" hidden><label>Reason details</label>' +
        '<input class="min" id="frs" type="text" placeholder="Which dimension / what happened / who are we waiting on"></div>' +
      '<div class="frow"><label>Measurement tool used (optional)</label>' +
        '<input class="min" id="ftl" type="text" placeholder="e.g. Calipers TF-CAL-01 \u2014 ties this check to a calibrated instrument"></div>' +
      '<div class="frow"><label>Notes</label><textarea class="min" id="fn" placeholder="What was checked, measurements, acceptance criteria\u2026"></textarea></div>' +
      '<div class="frow"><label>Attachment link (optional \u2014 never required)</label>' +
        '<input class="min" id="fatt" type="url" placeholder="https:// \u2026 Box link to report, photos, CMM data"></div>' +
      '<div class="fwarn" id="fwarn" hidden></div>' +
      '<div class="facts"><span class="note" id="fnote"></span>' +
        '<button class="qbtn cancel" id="fcancel">Cancel</button>' +
        '<button class="qbtn save" id="fsave">' + (editing?'Save changes':'Log result') + '</button></div>' +
      '</div>');
    app.appendChild(f);

    var $ = function(s){ return f.querySelector(s); };
    var syncReason = function(){
      var v=$('#fr').value, show=(v==='hold'||v==='fail');
      $('#frcRow').hidden = !show;
      $('#frsRow').hidden = !show;
      QMS.fit(t);
    };
    $('#fd').value = editing ? editing.d : QMS.todayStr();
    $('#fr').value = editing ? (editing.r||'pass') : 'pass';
    $('#frc').value = editing ? (editing.rc||'') : '';
    $('#frs').value = editing ? (editing.rs||'') : '';
    $('#ftl').value = editing ? (editing.tl||'') : '';
    $('#fn').value = editing ? (editing.n||'') : '';
    $('#fatt').value = editing ? (editing.att||'') : '';
    $('#fr').onchange = syncReason; syncReason();
    $('#fnote').textContent = editing
      ? ('Editing your entry \u2014 window closes ' + Math.round((editing.t+QMS.EDIT_WINDOW_MS-Date.now())/3600000) + 'h from now')
      : ('Inspector: ' + (me.fullName||me.username));

    $('#fcancel').onclick = function(){ t.closePopup(); };
    $('#fsave').onclick = function(){
      var warn = $('#fwarn');
      var d = $('#fd').value, res = $('#fr').value, rs = $('#frs').value.trim();
      var rc = $('#frc').value, tl = $('#ftl').value.trim();
      if(!d){ warn.textContent='Inspection date is required.'; warn.hidden=false; QMS.fit(t); return; }
      if((res==='hold'||res==='fail') && !rc){ warn.textContent='Pick a Hold/Fail reason code \u2014 fixed codes are what make failure patterns countable across jobs.'; warn.hidden=false; QMS.fit(t); return; }
      var att = $('#fatt').value.trim();
      if(att && !/^https?:\/\//i.test(att)){ warn.textContent='Attachment must be a full http(s) link.'; warn.hidden=false; QMS.fit(t); return; }
      warn.hidden=true;
      $('#fsave').disabled=true;

      var newLog, entry;
      var isHF = (res==='hold'||res==='fail');
      if(editing){
        entry = editing;
        entry.d=d; entry.r=res; entry.n=$('#fn').value.trim()||undefined;
        if(!entry.n) delete entry.n;
        if(isHF && rc) entry.rc=rc; else delete entry.rc;
        if(isHF && rs) entry.rs=rs; else delete entry.rs;
        if(tl) entry.tl=tl; else delete entry.tl;
        if(att) entry.att=att; else delete entry.att;
        entry.ed=Date.now();
        newLog = log;
      } else {
        entry = { t:Date.now(), d:d, r:res, by:me.id, byN:(me.fullName||me.username) };
        var n=$('#fn').value.trim(); if(n) entry.n=n;
        if(isHF && rc) entry.rc=rc;
        if(isHF && rs) entry.rs=rs;
        if(tl) entry.tl=tl;
        if(att) entry.att=att;
        newLog = QMS.appendLog(log, entry).list;
      }

      /* current status mirrors the most recent entry by inspection date
         (falling back to creation order on ties) */
      var latest = newLog.filter(function(e){ return e && !e.rl; }).sort(function(a,b){
        return (b.d||'')===(a.d||'') ? (b.t-a.t) : ((b.d||'')<(a.d||'')?-1:1);
      })[0];
      var cur = { st:latest.r, by:latest.by, byN:latest.byN, d:latest.d };
      if(latest.rc) cur.rc = latest.rc;
      if(latest.rs) cur.rs = latest.rs;

      Promise.all([
        t.set('card','shared','ivl', newLog),
        t.set('card','shared','iv',  cur)
      ]).then(function(){ t.closePopup(); }, function(){ t.closePopup(); });
    };
    QMS.fit(t);
  });
};

})();
</script>
<script>
/* ----- boot router (same shape as the TF-Recharge dispatch) ----- */
(function(){
  var view = QMS.getParam('view');
  var framed = (window.self !== window.top);
  var hasTrello = (typeof window.TrelloPowerUp !== 'undefined');
  var vb = document.getElementById('verBadge'); if(vb) vb.textContent = 'v' + QMS.VERSION;
  if(hasTrello && framed && !view){ QMS.initConnector(); }
  else if(hasTrello && framed && view){ QMS.initView(view); }
  else {
    document.getElementById('app').innerHTML =
      '<div class="standalone"><h1>TF-QMS v' + QMS.VERSION + '</h1>' +
      '<p>Trello Power-Up for UC Davis Tech Foundry — Equipment Maintenance &amp; Calibration, ' +
      'Project Intake, and Inspection &amp; Verification.</p>' +
      '<p>This page is the Power-Up connector and is meant to be loaded by Trello. ' +
      'Register this URL as the iframe connector at <code>trello.com/power-ups/admin</code>, ' +
      'then enable the Power-Up on the two boards. See <code>README.md</code> for setup and ' +
      '<code>CHANGELOG.md</code> for history.</p></div>';
  }
})();
</script>
