<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TF-QMS — Trello Power-Up</title>
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<!-- ============================================================
  TF-QMS  ·  UC Davis Tech Foundry QMS Power-Up
  ------------------------------------------------------------
  CHANGE LOGGING (standing instruction for all future editors,
  human or AI): before considering ANY modification to this file
  complete, add an entry to CHANGELOG.md at the repo root (date,
  author, summary of what changed and why, files touched) and
  bump QMS.VERSION (defined in the CORE FRAMEWORK script
  block below). This is the ONLY source file — all core framework
  and module code lives in the script blocks at the bottom of this
  page. New modules are added as a NEW script block registering via
  QMS.register(); existing blocks are never modified for that.
  ------------------------------------------------------------
  This one hosted page serves every role, chosen at load time by
  the ?view= query parameter (same pattern as TF-Recharge /
  TF-Message / TF-Plan):
    (no view)          connector — hidden iframe; registers capabilities
    ?view=section      combined card-back section (all active modules)
    ?view=classify     Card Type popup (Board 1)
    ?view=intake       Edit Intake Info popup form
    ?view=maintlog     Log Maintenance Event popup form
    ?view=inspectlog   Log Inspection Result popup form
    ?view=overview     board-level overview modal (&kind=maint|intake|holdfail)
    ?view=access       Manage QMS Access modal
    ?view=info         Power-Up Info popup (version + latest change)
  All internal iframe URLs are stamped with &v=VERSION — hard-learned
  lesson: Trello's connector caching serves stale code otherwise, and
  bumping VERSION on each release is the cache-bust. Equally hard-learned
  (v1.3): NEVER stamp per-call timestamps onto these URLs. Trello
  re-evaluates capabilities every few seconds; a URL that differs between
  evaluations makes Trello reload the card-back section iframe each time
  (visible flash/jitter). Within a release, URLs must be byte-stable.
  All code lives in this file: the CORE FRAMEWORK script block,
  then one self-contained script block per module.
============================================================ -->
<style>
  .ckgrid{display:grid;grid-template-columns:1fr 1fr;gap:2px 10px;margin-top:2px}
  .ck{display:flex;align-items:center;gap:6px;font-size:12px;cursor:pointer;padding:2px 0}
  .ck input{margin:0}
  /* Trello sets data-color-mode="light|dark" on <html>; adapt to both. */
  :root{
    --bg:#242528; --panel:#2b2c2f;
    --subtle:rgba(255,255,255,.06); --subtle-h:rgba(255,255,255,.12);
    --line:#46474b; --text:#cecfd2; --dim:#96999e; --dimmer:#85878c;
    --head:#e2e3e5; --blue:#579dff; --green:#4bce97; --red:#f87168;
    --yellow:#f5cd47; --orange:#fca362;
  }
  html[data-color-mode="light"]{
    --bg:#ffffff; --panel:#f1f2f4;
    --subtle:rgba(0,0,0,.05); --subtle-h:rgba(0,0,0,.09);
    --line:#dcdfe4; --text:#292a2e; --dim:#6b6e76; --dimmer:#8a8d94;
    --head:#1d2125; --blue:#1d7afc; --green:#22a06b; --red:#e2483d;
    --yellow:#b38600; --orange:#d97008;
  }
  *{box-sizing:border-box}
  html{background:transparent}
  html,body{margin:0}
  body{background:transparent; color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:13px; -webkit-font-smoothing:antialiased; line-height:1.45; padding:0}
  body.mode-modal{padding:14px 16px 16px; background:var(--bg)}
  body.mode-popup{padding:10px 12px 12px}
  body.mode-section{padding:2px 4px 6px}
  .num{font-variant-numeric:tabular-nums}

  /* ---- shared vocabulary (matches the TF-Recharge family) ---- */
  .sv-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
  .ghead{display:flex; align-items:baseline; gap:10px; padding:11px 2px 6px; margin-top:6px; border-top:1px solid var(--line)}
  .ghead:first-child{border-top:0; margin-top:0; padding-top:2px}
  .ghead .gname{font-size:12px; letter-spacing:.05em; text-transform:uppercase; color:var(--head); font-weight:800}
  .ghead .gsub{margin-left:auto; font-size:11.5px; color:var(--dimmer)}
  .qbtn{appearance:none; cursor:pointer; font:inherit; font-weight:700; font-size:12px; border-radius:6px; padding:7px 13px; border:0}
  .qbtn.save{background:var(--blue); color:#1d2125}
  html[data-color-mode="light"] .qbtn.save{color:#fff}
  .qbtn.save:hover{filter:brightness(1.08)}
  .qbtn.cancel{background:var(--subtle); color:var(--dim)}
  .qbtn.cancel:hover{background:var(--subtle-h); color:var(--text)}
  .qbtn.alt{background:transparent; color:var(--blue); border:1px solid rgba(87,157,255,.5)}
  .qbtn.alt:hover{background:rgba(87,157,255,.12)}
  .qbtn.danger{background:transparent; color:var(--red); border:1px solid rgba(248,113,104,.5)}
  .qbtn.danger:hover{background:rgba(248,113,104,.12)}
  .qbtn:disabled,.qbtn.dim{opacity:.4; cursor:not-allowed; filter:none}
  .qbtn.sm{font-size:11.5px; padding:5px 10px}
  .link{appearance:none; border:0; background:transparent; cursor:pointer; color:var(--dim);
    font:inherit; font-size:12px; font-weight:600; padding:4px 7px; border-radius:5px}
  .link:hover{background:var(--subtle); color:var(--text)}
  .link.blue{color:var(--blue)}

  /* ---- forms ---- */
  .frm{display:flex; flex-direction:column; gap:9px}
  .frow{display:flex; flex-direction:column; gap:3px}
  .frow label{font-size:11px; color:var(--dim); font-weight:700; text-transform:uppercase; letter-spacing:.04em}
  .min{width:100%; font:inherit; font-size:13px; padding:7px 9px;
    color:var(--text); background:var(--bg); border:1px solid var(--line); border-radius:6px}
  html[data-color-mode="light"] .min{background:#fff}
  .min::placeholder{color:var(--dimmer)}
  .min:focus{outline:0; border-color:var(--blue)}
  textarea.min{resize:vertical; min-height:56px}
  select.min{appearance:none; -webkit-appearance:none; cursor:pointer; padding-right:26px;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' viewBox='0 0 10 10'><path d='M2 3l3 3 3-3' stroke='%239fadbc' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat; background-position:right 9px center}
  .fgrid2{display:grid; grid-template-columns:1fr 1fr; gap:9px}
  .facts{display:flex; gap:8px; justify-content:flex-end; margin-top:4px; align-items:center}
  .facts .note{margin-right:auto; font-size:11px; color:var(--dimmer)}
  .fwarn{font-size:11.5px; font-weight:600; color:var(--red)}
  .fwarn[hidden]{display:none}

  /* ---- card-back section blocks ---- */
  .qsec{margin-bottom:2px}
  .fieldgrid{display:grid; grid-template-columns:max-content 1fr; column-gap:14px; row-gap:3px; padding:2px 2px 6px}
  .fieldgrid .fk{font-size:11.5px; color:var(--dim); font-weight:600; white-space:nowrap}
  .fieldgrid .fv{font-size:12.5px; color:var(--text); min-width:0; overflow-wrap:anywhere}
  .fieldgrid .fv.empty{color:var(--dimmer); font-style:italic}
  .chip{display:inline-block; font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; border:1px solid var(--line); color:var(--dim)}
  .chip.green{color:var(--green); border-color:rgba(75,206,151,.5); background:rgba(75,206,151,.10)}
  .chip.yellow{color:var(--yellow); border-color:rgba(245,205,71,.5); background:rgba(245,205,71,.10)}
  .chip.red{color:var(--red); border-color:rgba(248,113,104,.5); background:rgba(248,113,104,.10)}
  .chip.orange{color:var(--orange); border-color:rgba(252,163,98,.5); background:rgba(252,163,98,.10)}
  .chip.gray{color:var(--dim)}
  .secacts{display:flex; align-items:center; gap:8px; padding:2px 2px 4px; flex-wrap:wrap}
  .secacts .why{font-size:11px; color:var(--dimmer)}
  .loghead{display:flex; align-items:center; gap:8px; padding:7px 2px 3px}
  .loghead .sv-label{flex:1 1 auto}
  .le{display:flex; gap:9px; align-items:flex-start; padding:5px 2px; border-top:1px solid var(--line); font-size:12px}
  .le:first-of-type{border-top:0}
  .le .lts{flex:0 0 70px; color:var(--dimmer); display:flex; flex-direction:column; line-height:1.25}
  .le .lts .d{font-weight:700; color:var(--dim)}
  .le .lbody{flex:1 1 auto; min-width:0}
  .le .lbody .l1{display:flex; align-items:center; gap:7px; flex-wrap:wrap}
  .le .lbody .lnm{font-weight:700; color:var(--text)}
  .le .lbody .lby{color:var(--dimmer); font-size:11.5px}
  .le .lbody .lnote{color:var(--dim); margin-top:1px; white-space:pre-wrap; overflow-wrap:anywhere}
  .le .lbody a{color:var(--blue); text-decoration:none; font-size:11.5px}
  .le .lbody a:hover{text-decoration:underline}
  .le .ledit{flex:0 0 auto}
  .le.edited .lts .d::after{content:" ·"; color:var(--dimmer)}
  .empty{padding:7px 2px; color:var(--dimmer); font-size:12px; font-style:italic}
  .capwarn{margin:5px 0 2px; font-size:11px; color:var(--yellow); font-weight:600}

  /* ---- classify block ---- */
  .classify{display:flex; flex-direction:column; gap:7px; padding:4px 2px 6px}
  .classify .cq{font-size:13px; font-weight:700; color:var(--head)}
  .classify .cx{font-size:12px; color:var(--dim)}
  .cbtns{display:flex; gap:8px; flex-wrap:wrap}

  /* ---- overview modal ---- */
  .ovhead{display:flex; align-items:baseline; gap:10px; margin-bottom:8px}
  .ovhead .ovt{font-size:15px; font-weight:800; color:var(--head)}
  .ovhead .ovn{margin-left:auto; font-size:12px; color:var(--dimmer)}
  .ove{display:grid; grid-template-columns:1fr max-content max-content; gap:10px; align-items:center;
    padding:7px 8px; border-top:1px solid var(--line); cursor:pointer; border-radius:6px}
  .ove:hover{background:var(--subtle)}
  .ove .ovc{min-width:0}
  .ove .ovc .cn{font-weight:700; font-size:13px; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .ove .ovc .cl{font-size:11px; color:var(--dimmer)}
  .ove .ovd{font-size:11.5px; color:var(--dim); white-space:nowrap}

  /* ---- access modal ---- */
  .mrow{display:flex; align-items:center; gap:10px; padding:6px 4px; border-top:1px solid var(--line)}
  .mrow:first-of-type{border-top:0}
  .mrow .mn{flex:1 1 auto; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .mrow .mu{color:var(--dimmer); font-size:11.5px}
  .notice{border:1px solid var(--line); border-radius:8px; background:var(--subtle); padding:9px 11px; font-size:12px; color:var(--dim); margin:6px 0}
  .notice b{color:var(--text)}
  .notice.warn{border-color:rgba(245,205,71,.45)}

  /* ---- info popup ---- */
  .inf{display:flex; flex-direction:column; gap:6px; padding:2px}
  .inf .iv{font-size:16px; font-weight:800; color:var(--head)}
  .inf .is{font-size:12px; color:var(--dim)}
  .inf .im{font-size:11px; color:var(--dimmer)}

  .savechip{font-size:11px;font-weight:600;padding:2px 9px;border-radius:999px;border:1px solid var(--line);color:var(--dim);white-space:nowrap}
  .savechip.ok{color:var(--green);border-color:rgba(75,206,151,.45)}
  .savechip.err{color:var(--red);border-color:rgba(248,113,104,.45)}
  .savechip:empty{display:none}

  /* standalone landing (file opened directly in a browser) */
  .standalone{max-width:640px; margin:40px auto; background:var(--panel); border-radius:10px; padding:20px 24px}
  .standalone h1{font-size:16px; margin:0 0 8px; color:var(--head)}
  .standalone p{color:var(--dim); font-size:13px}
  .standalone code{background:var(--subtle); padding:1px 5px; border-radius:4px; font-size:12px}
  #verBadge{position:fixed; right:7px; bottom:6px; font-size:10px; color:#5b6b7a; opacity:.6; z-index:9; pointer-events:none}
</style>

<body>
<div id="app"></div>
<div id="verBadge"></div>

<script>
/* ================= CORE FRAMEWORK ================= */
var QMS = window.QMS = {};

/* ----- identity / configuration ----- */
QMS.VERSION = '1.3';
/* Fallback shown by Power-Up Info if CHANGELOG.md can't be fetched.
   Keep in sync with the most recent CHANGELOG.md summary line. */
QMS.LAST_CHANGE = 'Fixed card-back section flash/jitter: removed the per-call cb= timestamp from internal iframe URLs so Trello stops reloading the section iframe on every capability poll. v=VERSION remains the sole (per-release) cache-buster.';

/* Native due-date sync (Module 1) requires the Trello REST API.
   Paste the Power-Up's API key from https://trello.com/power-ups/admin
   (Power-Up → API Key tab). If left blank, due-date sync is skipped
   gracefully and only the QMS badge reflects Next Due. */
QMS.APP_KEY  = 'e20fe97b7f728dc56bcef415eaadddb2';
QMS.APP_NAME = 'TF-QMS';

/* Pin the two board IDs here after install (Board menu → ... → the ID
   is in the board URL, or run t.board('id') from the console). Until
   pinned, boards are matched by name pattern — fine for first run,
   but IDs are the durable contract. */
QMS.BOARD_IDS = {
  ops:   '',   // "UC Davis Tech Foundry Daily Operations"
  equip: ''    // "Equipment and Maintenance"
};
QMS.BOARD_NAME_PATTERNS = { ops:/daily\s*operations/i, equip:/equipment/i };

/* Which modules are active on which board kind. Future modules append
   their id here (or to a new board kind) — nothing else changes. */
QMS.BOARD_MODULES = {
  equip: ['equipment'],
  ops:   ['intake','inspection']
};

/* Append-only log discipline: entries are editable by their original
   author for this window after creation, and never deletable. */
QMS.EDIT_WINDOW_MS = 24 * 60 * 60 * 1000;   // 24 h

/* Trello caps Power-Up storage (~4096 chars per value). When a log's
   serialized size passes this budget, the oldest entries are compacted
   (notes/attachment links stripped, date/type/author kept) rather than
   deleted, and the section shows an archive warning. */
QMS.LOG_BYTE_BUDGET = 3600;

QMS.SELF = location.origin + location.pathname;
QMS.ICON = 'data:image/svg+xml,' + encodeURIComponent(
  '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#888888" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="m9 14 2 2 4-4"/></svg>');

/* ----- tiny helpers ----- */
QMS.getParam = function(n){ try{ return new URLSearchParams(location.search).get(n); }catch(e){ return null; } };
QMS.esc = function(s){ return String(s==null?'':s).replace(/[&<>"']/g, function(c){
  return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]; }); };
QMS.el = function(html){ var d=document.createElement('div'); d.innerHTML=html.trim(); return d.firstChild; };

/* Version-stamped internal URL — the anti-stale-cache lesson from the
   TF Power-Up family: every iframe URL carries v + cb. */
QMS.url = function(view, params){
  /* v=VERSION is the ONLY cache-buster. Never add a per-call timestamp:
     the card-back-section capability is re-evaluated by Trello every few
     seconds, and any URL that changes between evaluations makes Trello
     reload the section iframe each time (v1.2 and earlier did exactly
     this -> visible flash/jitter). Bumping VERSION on deploy is what
     busts the cache; within a release the URL must be byte-stable. */
  var u = QMS.SELF + '?view=' + encodeURIComponent(view) + '&v=' + QMS.VERSION;
  if(params) Object.keys(params).forEach(function(k){
    if(params[k]!==undefined && params[k]!==null) u += '&' + k + '=' + encodeURIComponent(params[k]);
  });
  return u;
};

/* ----- dates (stored as 'YYYY-MM-DD', local) ----- */
QMS.todayStr = function(){
  var d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
};
QMS.addDays = function(ymd, n){
  var p=(ymd||'').split('-'); if(p.length!==3) return null;
  var d=new Date(+p[0], +p[1]-1, +p[2]); d.setDate(d.getDate()+ (+n||0));
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
};
QMS.daysUntil = function(ymd){
  var p=(ymd||'').split('-'); if(p.length!==3) return null;
  var t=new Date(); t=new Date(t.getFullYear(),t.getMonth(),t.getDate());
  var d=new Date(+p[0], +p[1]-1, +p[2]);
  return Math.round((d-t)/86400000);
};
QMS.fmtDate = function(ymd){
  var p=(ymd||'').split('-'); if(p.length!==3) return ymd||'';
  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return M[+p[1]-1]+' '+(+p[2])+', '+p[0];
};

/* ----- board / member / whitelist ----- */
QMS.boardKind = function(t){
  return t.board('id','name').then(function(b){
    if(QMS.BOARD_IDS.equip && b.id===QMS.BOARD_IDS.equip) return 'equip';
    if(QMS.BOARD_IDS.ops   && b.id===QMS.BOARD_IDS.ops)   return 'ops';
    if(QMS.BOARD_IDS.equip || QMS.BOARD_IDS.ops){ /* IDs pinned; fall through to names only for the unpinned one */ }
    if(QMS.BOARD_NAME_PATTERNS.equip.test(b.name)) return 'equip';
    if(QMS.BOARD_NAME_PATTERNS.ops.test(b.name))   return 'ops';
    return null;
  }).catch(function(){ return null; });
};
QMS.me = function(t){ return t.member('id','fullName','username'); };
/* Whitelist is board-scoped shared storage: [{id, n}] — a member may be
   whitelisted on one board and not the other. NOTE: this is a client-side
   UI restriction only (see README) — a Power-Up with no backend cannot
   cryptographically enforce permissions; it deters casual edits. */
QMS.getWl = function(t){ return t.get('board','shared','qmsWl').then(function(v){ return Array.isArray(v)?v:[]; }).catch(function(){ return []; }); };
QMS.setWl = function(t, wl){ return t.set('board','shared','qmsWl', wl); };
QMS.isWl = function(t){
  return Promise.all([QMS.getWl(t), QMS.me(t)]).then(function(r){
    var wl=r[0], me=r[1];
    return wl.some(function(e){ return e && e.id===me.id; });
  }).catch(function(){ return false; });
};

/* ----- module registry ----- */
QMS.modules = {};
QMS.register = function(mod){ QMS.modules[mod.id] = mod; };
QMS.activeModules = function(kind){
  return (QMS.BOARD_MODULES[kind]||[]).map(function(id){ return QMS.modules[id]; }).filter(Boolean);
};

/* ----- log utilities (shared by equipment + inspection modules) -----
   Entry shape: { t:createdMs, d:'YYYY-MM-DD', by:memberId, byN:name,
                  n:note, att:url, ed:editedMs, ...module fields }
   Append-only: newest first; edit allowed for author within window;
   never deleted — compacted (n/att stripped, c:1 flag) if over budget. */
QMS.appendLog = function(list, entry){
  var out = [entry].concat(Array.isArray(list)?list:[]);
  var size = function(){ return JSON.stringify(out).length; };
  /* pass 1 — strip notes/attachment links, oldest first */
  for(var i=out.length-1; size()>QMS.LOG_BYTE_BUDGET && i>0; i--){
    var e = out[i];
    if(e && !e.rl && (e.n || e.att || e.tl)){ delete e.n; delete e.att; delete e.tl; e.c = 1; }
  }
  /* pass 2 — strip author display names on compacted entries (id kept) */
  for(var j=out.length-1; size()>QMS.LOG_BYTE_BUDGET && j>0; j--){
    var e2 = out[j];
    if(e2 && e2.c && e2.byN){ delete e2.byN; }
  }
  /* pass 3 — last resort so t.set never hits Trello's ~4 KB hard cap:
     collapse the oldest compacted entries into a visible roll-up stub
     { rl:count, f:firstDate, l:lastDate }. Nothing vanishes silently —
     the stub renders in the section as N rolled-up entries with an
     instruction to archive the full history to Box. */
  while(size()>QMS.LOG_BYTE_BUDGET && out.length>2){
    var last = out[out.length-1];
    var stub = (last && last.rl) ? out.pop() : { rl:0, f:null, l:null };
    var victim = out.pop();
    if(victim && victim.rl){ stub.rl+=victim.rl; stub.f=stub.f&&victim.f?(victim.f<stub.f?victim.f:stub.f):(stub.f||victim.f); stub.l=stub.l&&victim.l?(victim.l>stub.l?victim.l:stub.l):(stub.l||victim.l); }
    else if(victim){
      stub.rl += 1;
      if(!stub.f || (victim.d && victim.d < stub.f)) stub.f = victim.d;
      if(!stub.l || (victim.d && victim.d > stub.l)) stub.l = victim.d;
    }
    out.push(stub);
  }
  return { list: out, compacted: out.some(function(e){ return e && (e.c || e.rl); }) };
};
QMS.canEdit = function(entry, meId){
  return entry && entry.by===meId && (Date.now()-(entry.t||0)) < QMS.EDIT_WINDOW_MS;
};

/* ----- native due-date sync (used by Equipment module) ----- */
QMS.dueSyncAvailable = function(){ return !!QMS.APP_KEY; };
QMS.syncNativeDue = function(t, ymd){
  if(!QMS.APP_KEY) return Promise.resolve({skipped:'nokey'});
  var api; try{ api = t.getRestApi(); }catch(e){ return Promise.resolve({skipped:'noapi'}); }
  return api.isAuthorized().then(function(ok){
    if(!ok) return {skipped:'noauth'};
    return Promise.all([api.getToken(), t.card('id')]).then(function(r){
      var iso = new Date(ymd + 'T17:00:00').toISOString();   // 5 pm local on the due day
      return fetch('https://api.trello.com/1/cards/' + r[1].id +
                   '?due=' + encodeURIComponent(iso) +
                   '&key=' + QMS.APP_KEY + '&token=' + encodeURIComponent(r[0]),
                   { method:'PUT' })
        .then(function(res){ return res.ok ? {ok:true} : {err:res.status}; });
    });
  }).catch(function(e){ return {err:String(e&&e.message||e)}; });
};
QMS.authorizeDueSync = function(t){
  try{
    return t.getRestApi().authorize({ scope:{read:true, write:true}, expiration:'never' });
  }catch(e){ return Promise.reject(e); }
};

/* ----- theme (Trello sets data-color-mode late; poll a few times) ----- */
QMS.applyTheme = function(t){
  var apply = function(){
    var th='dark';
    try{ var c=t.getContext&&t.getContext(); if(c&&(c.theme==='dark'||c.theme==='light')) th=c.theme; }catch(e){}
    var a=document.documentElement.getAttribute('data-color-mode');
    if(a==='dark'||a==='light') th=a;
    document.documentElement.setAttribute('data-color-mode', th);
  };
  apply(); [150,500,1500].forEach(function(ms){ setTimeout(apply, ms); });
};

/* ============================================================
   CONNECTOR — registers all capabilities; per-board activation
============================================================ */
QMS.initConnector = function(){
  var initOpts = QMS.APP_KEY ? { appKey:QMS.APP_KEY, appName:QMS.APP_NAME } : undefined;

  window.TrelloPowerUp.initialize({

    /* --- card front badges --- */
    'card-badges': function(t){
      return QMS.boardKind(t).then(function(kind){
        if(!kind) return [];
        if(kind==='ops'){
          /* Card Type gate (core): unset → classify prompt; internal → nothing */
          return t.get('card','shared','qt').then(function(qt){
            if(!qt) return [{ text:'Classify this card', color:'light-gray' }];
            if(qt==='int') return [];
            return Promise.all(QMS.activeModules('ops').map(function(m){
              return m.badges ? m.badges(t) : [];
            })).then(function(arrs){ return [].concat.apply([], arrs); });
          });
        }
        return Promise.all(QMS.activeModules(kind).map(function(m){
          return m.badges ? m.badges(t) : [];
        })).then(function(arrs){ return [].concat.apply([], arrs); });
      });
    },

    /* --- combined card-back section (Trello allows one per Power-Up;
           the section iframe renders every active module's block) --- */
    'card-back-section': function(t){
      return QMS.boardKind(t).then(function(kind){
        if(!kind) return;
        var make = function(height){
          var u = QMS.url('section', { kind:kind });
          try{ if(t.signUrl) u = t.signUrl(u); }catch(e){}
          return {
            title: 'TF-QMS v' + QMS.VERSION,
            icon: QMS.ICON,
            content: { type:'iframe', url:u, height:height }
          };
        };
        if(kind==='ops'){
          return t.get('card','shared','qt').then(function(qt){
            if(qt==='int') return;              /* Internal: no QMS UI at all */
            return make(qt ? 340 : 110);        /* job section vs classify prompt */
          });
        }
        return make(330);
      });
    },

    /* --- board buttons --- */
    'board-buttons': function(t){
      return QMS.boardKind(t).then(function(kind){
        if(!kind) return [];
        var modal = function(tt, view, params, title, h){
          var u = QMS.url(view, params);
          try{ if(tt.signUrl) u = tt.signUrl(u); }catch(e){}
          return tt.modal({ url:u, fullscreen:false, height:h||620, title:title, accentColor:'#242528' });
        };
        var btns = [];
        QMS.activeModules(kind).forEach(function(m){
          (m.boardButtons||[]).forEach(function(b){
            btns.push({ icon:{dark:QMS.ICON, light:QMS.ICON}, text:b.text, callback:function(tt){
              return modal(tt, 'overview', {kind:b.kind}, b.text, 620);
            }});
          });
        });
        btns.push({ icon:{dark:QMS.ICON, light:QMS.ICON}, text:'Manage QMS Access', callback:function(tt){
          return modal(tt, 'access', null, 'Manage QMS Access', 520);
        }});
        btns.push({ icon:{dark:QMS.ICON, light:QMS.ICON}, text:'Power-Up Info', callback:function(tt){
          var u = QMS.url('info');
          try{ if(tt.signUrl) u = tt.signUrl(u); }catch(e){}
          return tt.popup({ title:'TF-QMS', url:u, height:150 });
        }});
        return btns;
      });
    },

    /* --- card button: reclassify path for Internal cards (whitelist only).
           Internal cards intentionally show no badge/section; this small
           whitelisted-only button is how a misclassified card gets fixed. --- */
    'card-buttons': function(t){
      return QMS.boardKind(t).then(function(kind){
        if(kind!=='ops') return [];
        return Promise.all([t.get('card','shared','qt'), QMS.isWl(t)]).then(function(r){
          if(r[0]!=='int' || !r[1]) return [];
          return [{ icon:QMS.ICON, text:'QMS: Card Type', callback:function(tt){
            var u = QMS.url('classify');
            try{ if(tt.signUrl) u = tt.signUrl(u); }catch(e){}
            return tt.popup({ title:'Card Type', url:u, height:170 });
          }}];
        });
      });
    }

  }, initOpts);
};

/* ============================================================
   VIEW ROUTER — every non-connector role of this page
============================================================ */
QMS.views = {};   /* modules add their form views here (maintlog, intake, inspectlog) */

QMS.initView = function(view){
  var t;
  var iframeOpts = QMS.APP_KEY ? { appKey:QMS.APP_KEY, appName:QMS.APP_NAME } : undefined;
  try{ t = window._t = window.TrelloPowerUp.iframe(iframeOpts); }catch(e){ t=null; }

  QMS.applyTheme(t);
  var app = document.getElementById('app');
  var core = { section:QMS.viewSection, classify:QMS.viewClassify, access:QMS.viewAccess,
               overview:QMS.viewOverview, info:QMS.viewInfo };
  var fn = core[view] || QMS.views[view];
  if(fn) fn(t, app);
};

/* ---- shared: popup sizing ---- */
QMS.fit = function(t, sel){
  var f=function(){ try{ t.sizeTo(sel||'#app'); }catch(e){} };
  f(); [120,400,900].forEach(function(ms){ setTimeout(f, ms); });
};

/* ============================================================
   VIEW: combined card-back section
============================================================ */
QMS.viewSection = function(t, app){
  document.body.classList.add('mode-section');
  var kind = QMS.getParam('kind');
  var render = function(){
    Promise.all([ QMS.isWl(t), QMS.me(t),
                  kind==='ops' ? t.get('card','shared','qt') : Promise.resolve(null) ])
    .then(function(r){
      var ctx = { wl:r[0], me:r[1], qt:r[2], refresh:render };
      app.innerHTML = '';
      if(kind==='ops' && !ctx.qt){
        /* neutral classification prompt — the only QMS UI until typed */
        var c = QMS.el('<div class="classify">' +
          '<div class="cq">Classify this card</div>' +
          '<div class="cx">Is this a client job/request, or an internal task, note, or improvement? ' +
          'QMS intake and inspection tracking only applies to jobs.</div>' +
          '<div class="cbtns"></div>' +
          (ctx.wl ? '' : '<div class="secacts"><span class="why">Only QMS-authorized members can set the card type. Ask a QMS admin (Manage QMS Access on the board menu).</span></div>') +
          '</div>');
        var btns = c.querySelector('.cbtns');
        var mk = function(label, val, cls){
          var b = QMS.el('<button class="qbtn '+cls+'">'+label+'</button>');
          if(!ctx.wl){ b.disabled = true; }
          b.onclick = function(){
            t.set('card','shared','qt', val).then(function(){ render(); });
          };
          return b;
        };
        btns.appendChild(mk('Job / Request','job','save'));
        btns.appendChild(mk('Internal (Task / Note / Improvement)','int','cancel'));
        app.appendChild(c);
        QMS.fit(t);
        return;
      }
      if(kind==='ops' && ctx.qt==='int'){
        /* connector hides the section for internal cards; if we're here the
           type just changed — show a settling note */
        app.appendChild(QMS.el('<div class="empty">Internal card — no QMS tracking. (This section disappears on reload.)</div>'));
        QMS.fit(t); return;
      }
      var mods = QMS.activeModules(kind);
      var chain = Promise.resolve();
      if(kind==='ops'){
        var head = QMS.el('<div class="secacts"><span class="why">Card type: <b>Job / Request</b></span></div>');
        if(ctx.wl){
          var chg = QMS.el('<button class="link">change</button>');
          chg.onclick = function(){
            t.popup({ title:'Card Type', url:QMS.url('classify'), height:170 });
          };
          head.appendChild(chg);
        }
        app.appendChild(head);
      }
      mods.forEach(function(m){
        chain = chain.then(function(){
          var mount = document.createElement('div'); mount.className='qsec';
          app.appendChild(mount);
          return m.section(t, mount, ctx);
        });
      });
      chain.then(function(){ QMS.fit(t); });
    });
  };
  try{ t.render(function(){ QMS.applyTheme(t); render(); }); }catch(e){ render(); }
  render();
};

/* ============================================================
   VIEW: classify popup (reclassification path)
============================================================ */
QMS.viewClassify = function(t, app){
  document.body.classList.add('mode-popup');
  Promise.all([QMS.isWl(t), t.get('card','shared','qt')]).then(function(r){
    var wl=r[0], qt=r[1];
    app.innerHTML='';
    var c = QMS.el('<div class="classify">' +
      '<div class="cx">Current type: <b>' + (qt==='job'?'Job / Request': qt==='int'?'Internal':'not set') + '</b>. ' +
      'Reclassifying does not erase QMS data already on the card; it only changes which QMS sections apply.</div>' +
      '<div class="cbtns"></div>' +
      (wl ? '' : '<div class="fwarn">Only QMS-authorized members can change the card type.</div>') +
      '</div>');
    var btns=c.querySelector('.cbtns');
    var mk=function(label,val,cls){
      var b=QMS.el('<button class="qbtn '+cls+'">'+label+'</button>');

      b.onclick=function(){ t.set('card','shared','qt',val).then(function(){ t.closePopup(); }); };
      return b;
    };
    btns.appendChild(mk('Job / Request','job','save'));
    btns.appendChild(mk('Internal','int','cancel'));
    app.appendChild(c);
    QMS.fit(t);
